kind = "web"
previewPath = "/"
title = "Burst Popcorn Co."
version = "1.0.0"
id = "artifacts/burst-popcorn"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20987

[services.development]
run = "pnpm --filter @workspace/burst-popcorn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/burst-popcorn", "run", "build" ]
serve = "static"
publicDir = "artifacts/burst-popcorn/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20987"
BASE_PATH = "/"
